services:
  app:
    build: .
    volumes:
      # Mount the current directory to /app in the container
      # This allows input files (background.mp4) to be read
      # and output files to be saved back to the host
      - .:/app
    environment:
      # Pass the Gemini API key from host environment to container
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    stdin_open: true    # Allow interactive input
    tty: true          # Allocate a pseudo-TTY for interactive mode

  test:
    build: .
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: python test_setup.py